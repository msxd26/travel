services:
  db:
    image: postgres:15.2
    container_name: best_travel
    restart: always
    volumes:
      - ./sql/create_schema.sql:/docker-entrypoint-initdb.d/create_schema.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/data.sql
    environment:
      - POSTGRES_DB=best_travel
      - POSTGRES_USER=jsaire
      - POSTGRES_PASSWORD=test123
    ports:
      - "5432:5432"
  cache:
    image: redis:6.2-alpine
    container_name: best_travel_cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --loglevel warning --requirepass test123

  document-db:
    image: mongo:6.0.4
    restart: always
    container_name: best_travel_users
    environment:
      MONGO_INITDB_ROOT_USERNAME: jsaire
      MONGO_INITDB_ROOT_PASSWORD: test123
      MONGO_INITDB_DATABASE: app_users
    ports:
      - "27017:27017"
    volumes:
      - ./sql/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro